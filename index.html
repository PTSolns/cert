<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTSolns Certification Repository</title>
  <link rel="icon" type="image/x-icon" href="https://docs.ptsolns.com/Logo/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --brand-blue: rgb(30, 137, 175);
      --brand-grey: rgb(128, 129, 132);
      --bg: #0b1220;
      --card: rgba(128, 129, 132, 0.08);
      --text: rgba(255, 255, 255, 0.92);
      --muted: var(--brand-grey);
      --line: rgba(128, 129, 132, 0.25);
      --accent: var(--brand-blue);
      --shadow: 0 18px 60px rgba(0,0,0,.45);
      --radius: 16px;
    }
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 18px; }
    header { display:flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; justify-content: space-between; margin-bottom: 40px; }
    .logo-img { width: 90px; height: auto; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #fff;}
    .header-btn { display: inline-flex; align-items: center; gap: 8px; border: 2px solid rgba(128, 129, 132, 0.4); background: rgba(255,255,255,0.05); color: var(--text); padding: 12px 24px; border-radius: 12px; font-weight: 600; text-decoration: none; transition: all .2s ease; }
    .header-btn:hover { background: rgba(30, 137, 175, 0.15); border-color: var(--accent); color: var(--accent); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
    .top { border-bottom: 1px solid var(--line); margin-bottom: 20px; padding-bottom: 10px; }
    ul.custom-links { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
    ul.custom-links li a { color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 10px; font-size: 16px; }
    ul.custom-links li a::before { content: '→'; color: var(--accent); }
    ul.custom-links li a:hover { color: var(--accent); }
    footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--line); margin-top: 60px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="header-left">
        <img src="https://docs.ptsolns.com/Logo/Logo_JPG_Full_Color_Square_PTSolns.jpg" alt="Logo" class="logo-img">
        <div>
          <h1>PTSolns Certification Repository</h1>
          <p>Supporting material for certifications. To request additional information, use the <a href="https://ptsolns.com/pages/contact" target="_blank" style="color:var(--accent);">Contact Form</a>.</p>
        </div>
      </div>
      <div class="header-links">
        <a href="https://github.com/PTSolns/cert" target="_blank" class="header-btn">GitHub</a>
        <a href="https://docs.ptsolns.com" target="_blank" class="header-btn">Docs Repo</a>
        <a href="https://ptsolns.com" target="_blank" class="header-btn">Main Site</a>
      </div>
    </header>

    <section class="card">
      <div class="top"><h2>Product Certifications</h2></div>
      <ul class="custom-links">
        <li><a href="https://github.com/PTSolns/cert/tree/main/Certifications/FCC" target="_blank">FCC (Federal Communications Commission)</a></li>
        <li><a href="https://cert.PTSolns.com/Certifications/IC_ISED" target="_blank">IC / ISED (Canada)</a></li>
        <li><a href="https://github.com/PTSolns/cert/tree/main/Certifications/REACH" target="_blank">REACH</a></li>
        <li><a href="https://github.com/PTSolns/cert/tree/main/Certifications/RoHS" target="_blank">RoHS</a></li>
      </ul>
    </section>
  </div>
</body>
</html>
